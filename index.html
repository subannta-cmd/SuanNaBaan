<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suan Na Baan 🌿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        .main-container { display: flex; flex-wrap: wrap; height: 100vh; width: 100%; }
        
        /* ส่วนเมนูสินค้า */
        .menu-side { flex: 1 1 600px; overflow-y: auto; padding: 1.5rem; background: #f8fafc; }
        .menu-card { transition: all 0.2s; background: white; cursor: pointer; border-radius: 20px; border: 1px solid #f1f5f9; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
        .menu-card:active { transform: scale(0.95); background-color: #f0fdf4; }
        .category-header { grid-column: 1 / -1; margin-top: 1rem; border-left: 4px solid #15803d; padding-left: 0.75rem; color: #15803d; font-weight: bold; font-size: 0.85rem; }
        
        /* ส่วนบิลใบเสร็จ */
        .receipt-side { flex: 0 0 350px; background: white; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; box-shadow: -4px 0 15px rgba(0,0,0,0.05); height: 100vh; position: sticky; top: 0; }
        .receipt-header { padding: 1rem; text-align: center; border-bottom: 1px dashed #e2e8f0; }
        #receipt-logo-img { max-width: 50px; margin-bottom: 0.5rem; }
        .receipt-q-text { font-size: 2.2rem; line-height: 1; font-weight: 900; color: #1e293b; margin: 0.1rem 0; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .weight-tag { position: absolute; top: 6px; right: 6px; font-size: 8px; background: #dcfce7; color: #166534; padding: 1px 6px; border-radius: 8px; font-weight: bold; }

        @media (max-width: 950px) {
            .main-container { flex-direction: column; overflow-y: auto; height: auto; }
            .menu-side { width: 100%; height: auto; flex: none; }
            .receipt-side { width: 100%; height: auto; border-left: 0; border-top: 2px solid #f1f5f9; flex: none; }
        }
        @media print { .print-hidden { display: none !important; } .receipt-side { width: 100% !important; position: absolute; top: 0; left: 0; } }
    </style>
</head>
<body class="text-slate-700">

    <script>
        // --- ส่วนตั้งค่าเริ่มต้นสำหรับทุกเครื่อง ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycby_03FB3yaccRhxfVq2Y9ahDxs_J-eUdEqVs0LYmQRtGqNY3DDoTh3GqLmHQGpahYMf/exec'; // ใส่ URL ของคุณที่นี่
        
        // รายการสินค้าเริ่มต้น (Hardcode ข้อมูลร้าน ณ Coco)
        const defaultMenu = [
            { name: 'ยอด 200g (ชุด 3 ถุง)', price: 50, cat: 'ยอดมะพร้าว (ถุง)', icon: '📦' },
            { name: 'ยอด 200g (ถุงเดียว)', price: 20, cat: 'ยอดมะพร้าว (ถุง)', icon: '🛍️' },
            { name: 'ยอด 400g (ชุด 3 ถุง)', price: 100, cat: 'ยอดมะพร้าว (ถุง)', icon: '📦' },
            { name: 'ยอด 400g (ถุงเดียว)', price: 35, cat: 'ยอดมะพร้าว (ถุง)', icon: '🛍️' },
            { name: 'ยอด 500g', price: 60, cat: 'ยอดมะพร้าว (ถุง)', icon: '🥥' },
            { name: 'น้ำมะพร้าว 250ml', price: 25, cat: 'เครื่องดื่ม', icon: '🌿' },
            { name: 'น้ำมะพร้าว 200ml', price: 20, cat: 'เครื่องดื่ม', icon: '🌿' },
            { name: 'น้ำตาลสด แก้ว', price: 25, cat: 'เครื่องดื่ม', icon: '🥤' },
            { name: 'มะพร้าวลูก (ถุง 6 ลูก)', price: 100, cat: 'มะพร้าวผล', icon: '🥥' },
            { name: 'มะพร้าว (ปลีก/ลูก)', price: 25, cat: 'มะพร้าวผล', icon: '🥥' }
        ];

        let menuItems = JSON.parse(localStorage.getItem('garden_menu')) || defaultMenu;
        let branchList = JSON.parse(localStorage.getItem('garden_branches')) || ["สาขา 01", "สาขา 02", "สาขา 03", "สาขา 04", "สาขา 05"];
        let branchName = localStorage.getItem('selected_branch') || branchList[0];
        let shopAddress = localStorage.getItem('shop_address') || "ณ COCO - สดจากสวน โทร 0910276732";
        let promptpayID = localStorage.getItem('garden_pp_id') || "0966697979"; 
        let shopLogoData = localStorage.getItem('shop_logo_data') || "";
        let orderQ = parseInt(localStorage.getItem('garden_order_q')) || 1; 
        
        let cart = []; 
        let discountType = 'percent'; 
        let editingIdx = -1;
    </script>

    <div class="main-container">
        <div class="menu-side print-hidden">
            <div class="flex flex-wrap justify-between items-center mb-6 gap-3">
                <div class="flex items-center gap-3">
                    <h1 class="text-xl font-black text-slate-800" id="display-branch-title"></h1>
                    <select id="branch-selector" onchange="changeBranch(this.value)" class="text-[10px] font-bold text-green-600 bg-green-50 px-2 py-1 rounded-lg border-none"></select>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="openAdmin()" class="w-10 h-10 bg-white border rounded-xl text-slate-400"><i class="fas fa-cog"></i></button>
                    <div class="flex items-center bg-white border rounded-xl p-1 h-10">
                        <button onclick="resetQueue()" class="w-8 h-8 flex items-center justify-center text-green-600"><i class="fas fa-sync-alt text-[10px]"></i></button>
                        <div class="px-3 font-black text-green-700 text-lg" id="next-q">#01</div>
                    </div>
                </div>
            </div>
            <div id="menu-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-3"></div>
        </div>

        <div id="receipt-area" class="receipt-side">
            <div class="receipt-header">
                <div id="receipt-logo-container"></div>
                <h2 class="font-black text-slate-800 uppercase text-sm">Suan Na Baan</h2>
                <p id="receipt-address" class="text-[9px] text-slate-400"></p>
                <div class="receipt-q-box my-2 border-y py-1">
                    <p class="text-[9px] font-bold text-slate-400 uppercase">#RECEIPT - <span id="branch-display-receipt"></span></p>
                    <div class="receipt-q-text">#<span id="receipt-q">01</span></div>
                    <p id="cur-date" class="text-[8px] text-slate-300 italic"></p>
                </div>
            </div>
            <div id="cart-items" class="flex-grow overflow-y-auto p-4 space-y-1"></div>
            <div class="p-6 bg-white border-t space-y-3">
                <div id="bill-qr-container" class="text-center"></div>
                <div class="flex items-center justify-between bg-slate-50 p-1.5 rounded-lg print-hidden">
                    <span class="text-[9px] font-bold text-slate-400 ml-2">ส่วนลด</span>
                    <div class="flex items-center gap-1">
                        <div class="flex bg-white border rounded-md overflow-hidden h-6">
                            <button onclick="toggleDiscountType('baht')" id="btn-baht" class="px-2 text-[9px] font-bold">฿</button>
                            <button onclick="toggleDiscountType('percent')" id="btn-percent" class="px-2 text-[9px] font-bold bg-slate-800 text-white">%</button>
                        </div>
                        <input type="number" id="discount-input" oninput="updateUI()" value="0" class="w-12 h-6 text-right border rounded px-1 font-bold text-red-500 text-xs">
                    </div>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-slate-400 font-bold text-[10px]">ยอดสุทธิ</span>
                    <span class="text-3xl font-black text-slate-800"><span id="total-price">0</span>.-</span>
                </div>
                <div class="grid grid-cols-4 gap-2 print-hidden">
                    <button onclick="clearCart()" class="py-3 bg-slate-50 text-slate-400 rounded-xl font-bold text-xs">ล้าง</button>
                    <button onclick="handleCheckout()" class="col-span-3 py-3 bg-green-700 text-white rounded-xl font-black text-md">พิมพ์บิล</button>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="modal print-hidden">
        <div class="bg-white rounded-[2rem] w-full max-w-lg p-6 shadow-2xl m-4 max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">⚙️ ตั้งค่าระบบ</h2>
                <button onclick="closeAdmin()" class="text-slate-400 text-2xl">&times;</button>
            </div>
            <div class="flex-grow overflow-y-auto pr-2 space-y-4">
                <div class="bg-slate-50 p-3 rounded-xl border">
                    <label class="text-[10px] font-bold text-slate-400 block mb-1">ข้อมูลหลัก</label>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <input type="text" id="pp-id-input" placeholder="พร้อมเพย์" class="p-2 border rounded-lg text-sm">
                        <input type="text" id="address-input" placeholder="ชื่อร้าน/ที่อยู่" class="p-2 border rounded-lg text-sm">
                    </div>
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between"><label class="text-[10px] font-bold text-slate-400">จัดการสาขา</label></div>
                    <div id="branch-edit-list" class="grid grid-cols-2 gap-2"></div>
                </div>
                <div class="space-y-2 border-t pt-4">
                    <div class="flex justify-between items-center"><label class="text-[10px] font-bold text-slate-400 uppercase">สินค้า</label>
                    <button onclick="addNewMenuItem()" class="text-[10px] bg-green-600 text-white px-3 py-1 rounded-full">+ เพิ่ม</button></div>
                    <div id="admin-menu-list" class="space-y-2"></div>
                </div>
            </div>
            <button onclick="saveSettings()" class="w-full bg-green-700 text-white py-3 rounded-xl font-bold mt-4">บันทึกข้อมูลเครื่องนี้</button>
        </div>
    </div>

    <script>
        // ฟังก์ชัน Logic ทั้งหมด
        function renderAdminLists() {
            document.getElementById('branch-edit-list').innerHTML = branchList.map((b, i) => `
                <div class="flex bg-white border rounded-lg p-1 items-center">
                    <input type="text" value="${b}" onchange="branchList[${i}]=this.value" class="flex-grow text-[10px] p-1 outline-none font-bold">
                    <button onclick="branchList.splice(${i},1);renderAdminLists()" class="text-red-400 px-1">&times;</button>
                </div>`).join('');

            document.getElementById('admin-menu-list').innerHTML = menuItems.map((item, idx) => `
                <div class="bg-white p-2 rounded-xl border flex gap-2 items-center">
                    <input type="text" value="${item.icon}" onchange="menuItems[${idx}].icon=this.value" class="w-8 p-1 bg-slate-50 rounded text-center">
                    <input type="text" value="${item.name}" onchange="menuItems[${idx}].name=this.value" class="flex-grow text-[11px] font-bold outline-none">
                    <input type="number" value="${item.price}" onchange="menuItems[${idx}].price=Number(this.value)" class="w-12 p-1 bg-slate-50 rounded text-right text-[11px]">
                    <button onclick="menuItems.splice(${idx},1);renderAdminLists()" class="text-red-400"><i class="fas fa-trash-alt text-[10px]"></i></button>
                </div>`).join('');
        }

        function saveSettings() {
            promptpayID = document.getElementById('pp-id-input').value;
            shopAddress = document.getElementById('address-input').value;
            localStorage.setItem('garden_pp_id', promptpayID);
            localStorage.setItem('shop_address', shopAddress);
            localStorage.setItem('garden_menu', JSON.stringify(menuItems));
            localStorage.setItem('garden_branches', JSON.stringify(branchList));
            updateBranchOptions(); renderMenu(); updateUI(); closeAdmin();
        }

        function updateBranchOptions() {
            const selector = document.getElementById('branch-selector');
            selector.innerHTML = branchList.map(b => `<option value="${b}" ${b === branchName ? 'selected' : ''}>📍 ${b}</option>`).join('');
            document.getElementById('display-branch-title').innerText = branchName;
            document.getElementById('branch-display-receipt').innerText = branchName;
        }

        function updateUI() {
            const list = document.getElementById('cart-items'); 
            let total = 0;
            list.innerHTML = cart.map((item, idx) => {
                const sum = item.price * item.qty; total += sum;
                return `<div class="flex justify-between items-center border-b border-slate-50 py-1">
                    <div class="text-left"><p class="text-[10px] font-bold">${item.name}</p><p class="text-[8px] text-slate-400">${item.price} x ${item.qty}</p></div>
                    <span class="font-bold text-xs">${sum.toLocaleString()}.-</span>
                </div>`;
            }).join('');

            const disc = parseFloat(document.getElementById('discount-input').value) || 0;
            let final = Math.max(0, total - (discountType === 'percent' ? (total * disc / 100) : disc));
            document.getElementById('total-price').innerText = Math.round(final).toLocaleString();
            document.getElementById('cur-date').innerText = new Date().toLocaleString('th-TH');
            document.getElementById('receipt-address').innerText = shopAddress;

            const qr = document.getElementById('bill-qr-container');
            qr.innerHTML = (final > 0 && promptpayID) ? `<img src="https://promptpay.io/${promptpayID}/${final}.png" class="mx-auto w-24">` : '';
        }

        function renderMenu() {
            const grid = document.getElementById('menu-grid'); grid.innerHTML = '';
            const cats = [...new Set(menuItems.map(i => i.cat))];
            cats.forEach(c => {
                const head = document.createElement('div'); head.className = 'category-header'; head.innerText = c; grid.appendChild(head);
                menuItems.filter(i => i.cat === c).forEach(item => {
                    const card = document.createElement('div'); card.className = 'menu-card shadow-sm'; card.onclick = () => addToCart(item);
                    card.innerHTML = `<span class="text-3xl mb-2">${item.icon}</span><span class="text-[10px] font-bold text-center h-6">${item.name}</span><span class="text-green-700 font-black mt-1">${item.price}.-</span>`;
                    grid.appendChild(card);
                });
            });
        }

        function addToCart(i) { const x=cart.findIndex(c=>c.name===i.name); if(x>-1) cart[x].qty++; else cart.push({...i,qty:1}); updateUI(); }
        function openAdmin() { document.getElementById('admin-modal').style.display='flex'; document.getElementById('pp-id-input').value=promptpayID; document.getElementById('address-input').value=shopAddress; renderAdminLists(); }
        function closeAdmin() { document.getElementById('admin-modal').style.display='none'; }
        function changeBranch(v) { branchName=v; localStorage.setItem('selected_branch',v); updateBranchOptions(); updateUI(); }
        function resetQueue() { if(confirm('เริ่มคิวใหม่?')){ orderQ=1; updateQueueDisplay(); } }
        function clearCart() { cart=[]; document.getElementById('discount-input').value=0; updateUI(); }
        function updateQueueDisplay() { const s=orderQ.toString().padStart(2,'0'); document.getElementById('next-q').innerText='#'+s; document.getElementById('receipt-q').innerText=s; localStorage.setItem('garden_order_q',orderQ); }
        function toggleDiscountType(t) { discountType=t; document.getElementById('btn-baht').className=`px-2 text-[9px] font-bold ${t==='baht'?'bg-slate-800 text-white':'text-slate-400'}`; document.getElementById('btn-percent').className=`px-2 text-[9px] font-bold ${t==='percent'?'bg-slate-800 text-white':'text-slate-400'}`; updateUI(); }
        function addNewMenuItem() { menuItems.push({name:'สินค้าใหม่',price:0,cat:'ทั่วไป',icon:'✨'}); renderAdminLists(); }

        async function handleCheckout() { 
            if(cart.length===0) return; window.print(); 
            const p = { date: new Date().toLocaleString('th-TH'), branch: branchName, items: cart.map(i=>`${i.name}(${i.qty})`).join(','), total: document.getElementById('total-price').innerText, queue: orderQ };
            if(scriptURL !== 'YOUR_APPS_SCRIPT_URL') try { await fetch(scriptURL,{method:'POST',mode:'no-cors',body:JSON.stringify(p)}); } catch(e){}
            orderQ++; updateQueueDisplay(); clearCart(); 
        }

        updateQueueDisplay(); updateBranchOptions(); renderMenu(); updateUI();
    </script>
</body>
</html>
