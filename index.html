<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suan Na Baan 🌿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; overflow: hidden; }
        .menu-card { transition: all 0.2s; background: white; cursor: pointer; border-radius: 20px; border: 1px solid #f1f5f9; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
        .menu-card:active { transform: scale(0.95); background-color: #f0fdf4; }
        .category-header { grid-column: 1 / -1; margin-top: 1rem; border-left: 4px solid #15803d; padding-left: 0.75rem; color: #15803d; font-weight: bold; font-size: 0.85rem; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .weight-tag { position: absolute; top: 6px; right: 6px; font-size: 8px; background: #dcfce7; color: #166534; padding: 1px 6px; border-radius: 8px; font-weight: bold; }
        
        /* Compact Header Style */
        .receipt-header { padding: 0.75rem 1rem !important; }
        #receipt-logo-img { max-width: 45px !important; max-height: 45px !important; margin-bottom: 4px !important; }
        .receipt-title { font-size: 0.95rem !important; font-weight: 900; }
        .receipt-q-box { margin-top: 0.25rem !important; padding: 0.25rem 0 !important; }
        .receipt-q-text { font-size: 2.2rem !important; line-height: 1; margin: 0.1rem 0 !important; }
        #bill-qr-img { max-width: 90px !important; margin: 4px auto !important; display: block; }
        
        @media print { .print-hidden { display: none !important; } #receipt-area { width: 100% !important; position: absolute; top: 0; left: 0; } }
    </style>
</head>
<body class="text-slate-700">

    <script>
        // ใส่ URL ของ Google Apps Script ตรงนี้ครับ
        const scriptURL = 'https://script.google.com/macros/s/AKfycby_03FB3yaccRhxfVq2Y9ahDxs_J-eUdEqVs0LYmQRtGqNY3DDoTh3GqLmHQGpahYMf/exec'; 
        
        let menuItems = JSON.parse(localStorage.getItem('garden_menu')) || [
            { name: 'ยอด 200g (ชุด 3 ถุง)', price: 50, cat: 'ยอดมะพร้าว (ถุง)', icon: '📦' },
            { name: 'ยอด 500g', price: 60, cat: 'ยอดมะพร้าว (ถุง)', icon: '🥥' }
        ];

        let branchList = JSON.parse(localStorage.getItem('garden_branches')) || ["สาขา 01", "สาขา 02", "สาขา 03", "สาขา 04", "สาขา 05"];
        let branchName = localStorage.getItem('selected_branch') || branchList[0];
        let shopAddress = localStorage.getItem('shop_address') || "ณ COCO - สดจากสวน";
        let shopLogoData = localStorage.getItem('shop_logo_data') || "";
        let promptpayID = localStorage.getItem('garden_pp_id') || ""; 
        let orderQ = parseInt(localStorage.getItem('garden_order_q')) || 1; 
        
        let cart = []; 
        let discountType = 'percent'; 
    </script>

    <div id="admin-modal" class="modal print-hidden">
        <div class="bg-white rounded-[2rem] w-full max-w-lg p-6 shadow-2xl m-4 max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold flex items-center gap-2"><i class="fas fa-cog text-green-600"></i> ตั้งค่าระบบ</h2>
                <button onclick="closeAdmin()" class="w-8 h-8 flex items-center justify-center bg-slate-100 rounded-full text-slate-500">&times;</button>
            </div>
            
            <div class="flex-grow overflow-y-auto pr-2 space-y-4 text-left">
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">ข้อมูลร้านค้า</label>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <input type="text" id="pp-id-input" placeholder="พร้อมเพย์" class="p-2 bg-white border rounded-lg text-sm">
                        <input type="text" id="address-input" placeholder="ที่อยู่" class="p-2 bg-white border rounded-lg text-sm">
                    </div>
                    <input type="file" accept="image/*" onchange="handleLogoUpload(this)" class="text-[10px]">
                    <div id="logo-preview-container" class="mt-2"></div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">จัดการสาขา</label>
                        <button onclick="branchList.push('สาขาใหม่');renderAdminLists()" class="text-[10px] text-blue-600 font-bold">+ เพิ่มสาขา</button>
                    </div>
                    <div id="branch-edit-list" class="grid grid-cols-2 gap-2"></div>
                </div>

                <div class="space-y-2 border-t pt-4">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">รายการสินค้า</label>
                        <button onclick="addNewMenuItem()" class="text-[10px] bg-green-600 text-white px-3 py-1 rounded-full">+ เพิ่มสินค้า</button>
                    </div>
                    <div id="admin-menu-list" class="space-y-2"></div>
                </div>
            </div>
            <button onclick="saveSettings()" class="w-full bg-green-700 text-white py-3 rounded-xl font-bold mt-4 shadow-lg">บันทึกทั้งหมด</button>
        </div>
    </div>

    <div class="flex h-screen">
        <div class="w-2/3 p-6 overflow-y-auto print-hidden">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <h1 class="text-xl font-black text-slate-800" id="display-branch-title"></h1>
                    <select id="branch-selector" onchange="changeBranch(this.value)" class="text-[10px] font-bold text-green-600 bg-green-50 px-2 py-1 rounded-lg border-none"></select>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="openAdmin()" class="w-10 h-10 bg-white border rounded-xl text-slate-400"><i class="fas fa-cog"></i></button>
                    <div class="flex items-center bg-white border rounded-xl p-1 h-10">
                        <button onclick="resetQueue()" class="w-8 h-8 flex items-center justify-center text-green-600"><i class="fas fa-sync-alt text-[10px]"></i></button>
                        <div class="px-3 font-black text-green-700 text-lg" id="next-q">#01</div>
                    </div>
                </div>
            </div>
            <div id="menu-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-3"></div>
        </div>

        <div id="receipt-area" class="w-1/3 bg-white shadow-2xl flex flex-col border-l">
            <div class="receipt-header text-center border-b border-dashed">
                <div id="receipt-logo-container"></div>
                <h2 class="receipt-title uppercase">Suan Na Baan</h2>
                <p id="receipt-address" class="text-[9px] text-slate-400"></p>
                <div class="receipt-q-box border-y border-slate-50 mt-2">
                    <p class="text-[9px] font-bold text-slate-400">#RECEIPT - <span id="branch-display-receipt"></span></p>
                    <div class="receipt-q-text font-black text-slate-800">#<span id="receipt-q">01</span></div>
                    <p id="cur-date" class="text-[8px] text-slate-300 italic"></p>
                </div>
            </div>
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-1 p-4"></div>
            <div class="p-6 bg-white border-t space-y-3">
                <div id="bill-qr-container" class="text-center"></div>
                <div class="flex items-center justify-between bg-slate-50 p-1.5 rounded-lg print-hidden">
                    <span class="text-[9px] font-bold text-slate-400 ml-2 uppercase">ส่วนลด</span>
                    <div class="flex items-center gap-1">
                        <div class="flex bg-white border rounded-md overflow-hidden h-6">
                            <button onclick="toggleDiscountType('baht')" id="btn-baht" class="px-2 text-[9px] font-bold">฿</button>
                            <button onclick="toggleDiscountType('percent')" id="btn-percent" class="px-2 text-[9px] font-bold bg-slate-800 text-white">%</button>
                        </div>
                        <input type="number" id="discount-input" oninput="updateUI()" value="0" class="w-12 h-6 text-right bg-white border rounded-md px-1 font-bold text-red-500 text-xs outline-none">
                    </div>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-slate-400 font-bold text-[10px] uppercase">ยอดสุทธิ</span>
                    <span class="text-3xl font-black text-slate-800"><span id="total-price">0</span>.-</span>
                </div>
                <div class="grid grid-cols-4 gap-2 print-hidden">
                    <button onclick="clearCart()" class="py-3 bg-slate-50 text-slate-400 rounded-xl font-bold text-xs">ล้าง</button>
                    <button onclick="handleCheckout()" class="col-span-3 py-3 bg-green-700 text-white rounded-xl font-black text-md">พิมพ์บิล</button>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="modal print-hidden">
        <div class="bg-white p-6 rounded-[2rem] w-72 shadow-2xl text-center">
            <h3 id="edit-title" class="font-bold text-sm text-slate-800 mb-3 italic">จำนวน/น้ำหนัก</h3>
            <input type="number" step="0.01" id="edit-input" class="w-full p-3 text-3xl font-black text-center bg-slate-50 rounded-2xl outline-none text-green-700">
            <div class="grid grid-cols-2 gap-2 mt-6">
                <button onclick="closeEdit()" class="py-3 bg-slate-100 rounded-xl font-bold text-slate-400">ยกเลิก</button>
                <button onclick="confirmEdit()" class="py-3 bg-green-700 text-white rounded-xl font-bold">ตกลง</button>
            </div>
        </div>
    </div>

    <script>
        function renderAdminLists() {
            document.getElementById('branch-edit-list').innerHTML = branchList.map((b, i) => `
                <div class="flex bg-white border rounded-lg p-1 items-center">
                    <input type="text" value="${b}" onchange="branchList[${i}]=this.value" class="flex-grow text-[10px] p-1 outline-none font-bold">
                    <button onclick="branchList.splice(${i},1);renderAdminLists()" class="text-red-400 px-1"><i class="fas fa-times text-[10px]"></i></button>
                </div>`).join('');

            document.getElementById('admin-menu-list').innerHTML = menuItems.map((item, idx) => `
                <div class="bg-white p-3 rounded-xl border border-slate-100 space-y-2 shadow-sm text-left">
                    <div class="flex gap-1.5">
                        <input type="text" value="${item.icon || '📦'}" onchange="menuItems[${idx}].icon=this.value" class="w-8 p-1 bg-slate-50 rounded-lg text-center text-sm">
                        <input type="text" value="${item.name}" onchange="menuItems[${idx}].name=this.value" class="flex-grow text-[11px] font-bold border-b outline-none">
                        <input type="number" value="${item.price}" onchange="menuItems[${idx}].price=Number(this.value)" class="w-12 p-1 bg-slate-50 rounded-lg text-right text-[11px] font-bold">
                    </div>
                    <div class="flex justify-between items-center">
                        <input type="text" value="${item.cat}" onchange="menuItems[${idx}].cat=this.value" class="text-[10px] text-green-700 border-b outline-none font-bold w-1/2" placeholder="หมวดหมู่">
                        <div class="flex items-center gap-2">
                            <label class="text-[9px] flex items-center gap-1 cursor-pointer"><input type="checkbox" ${item.isWeight ? 'checked' : ''} onchange="menuItems[${idx}].isWeight=this.checked"> ชั่ง กก.</label>
                            <button onclick="menuItems.splice(${idx},1);renderAdminLists()" class="text-red-400"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function saveSettings() {
            promptpayID = document.getElementById('pp-id-input').value;
            shopAddress = document.getElementById('address-input').value;
            localStorage.setItem('garden_pp_id', promptpayID);
            localStorage.setItem('shop_address', shopAddress);
            localStorage.setItem('garden_menu', JSON.stringify(menuItems));
            localStorage.setItem('garden_branches', JSON.stringify(branchList));
            localStorage.setItem('shop_logo_data', shopLogoData);
            updateBranchOptions(); renderMenu(); updateUI(); closeAdmin();
        }

        function updateBranchOptions() {
            const selector = document.getElementById('branch-selector');
            selector.innerHTML = branchList.map(b => `<option value="${b}" ${b === branchName ? 'selected' : ''}>📍 ${b}</option>`).join('');
            document.getElementById('display-branch-title').innerText = branchName;
            document.getElementById('branch-display-receipt').innerText = branchName;
        }

        function updateUI() {
            const list = document.getElementById('cart-items'); 
            let total = 0;
            list.innerHTML = cart.map((item, idx) => {
                const sum = item.price * item.qty; total += sum;
                return `<div class="flex justify-between items-center bg-white p-1.5 border-b border-slate-50">
                    <div class="flex flex-col text-left"><span class="text-[10px] font-bold leading-tight">${item.name}</span><span class="text-[8px] text-slate-400">${item.price} x ${item.qty}</span></div>
                    <div class="flex items-center gap-2"><span class="font-bold text-xs">${sum.toLocaleString()}.-</span><button onclick="openEdit(${idx})" class="w-5 h-5 bg-slate-50 text-slate-400 rounded-md flex items-center justify-center print-hidden"><i class="fas fa-pen text-[7px]"></i></button></div>
                </div>`;
            }).join('');

            const discInp = parseFloat(document.getElementById('discount-input').value) || 0;
            let finalPrice = Math.max(0, total - (discountType === 'percent' ? (total * discInp / 100) : discInp));
            document.getElementById('total-price').innerText = Math.round(finalPrice).toLocaleString();
            document.getElementById('cur-date').innerText = new Date().toLocaleString('th-TH');
            document.getElementById('receipt-address').innerText = shopAddress;
            document.getElementById('receipt-logo-container').innerHTML = shopLogoData ? `<img id="receipt-logo-img" src="${shopLogoData}" class="mx-auto">` : '';

            const qrContainer = document.getElementById('bill-qr-container');
            if(finalPrice > 0 && promptpayID) {
                qrContainer.innerHTML = `<img id="bill-qr-img" src="https://promptpay.io/${promptpayID}/${finalPrice}.png"><p class="text-[8px] font-bold text-slate-300">SCAN TO PAY</p>`;
            } else qrContainer.innerHTML = '';
        }

        function renderMenu() {
            const grid = document.getElementById('menu-grid'); grid.innerHTML = '';
            const cats = [...new Set(menuItems.map(i => i.cat))];
            cats.forEach(c => {
                const head = document.createElement('div'); head.className = 'category-header'; head.innerText = c; grid.appendChild(head);
                menuItems.filter(i => i.cat === c).forEach(item => {
                    const card = document.createElement('div'); card.className = 'menu-card shadow-sm'; card.onclick = () => addToCart(item);
                    card.innerHTML = `${item.isWeight ? '<span class="weight-tag">ชั่ง กก.</span>' : ''}
                        <span class="text-3xl mb-2">${item.icon || '📦'}</span>
                        <span class="text-[10px] font-bold text-slate-600 text-center leading-tight h-6 flex items-center">${item.name}</span>
                        <span class="text-green-700 font-black text-md mt-1">${item.price}.-</span>`;
                    grid.appendChild(card);
                });
            });
        }

        function handleLogoUpload(i) { const f = i.files[0]; if(f) { const r = new FileReader(); r.onload=(e)=>{shopLogoData=e.target.result;document.getElementById('logo-preview-container').innerHTML=`<img src="${shopLogoData}" class="h-10 border rounded">`;}; r.readAsDataURL(f); } }
        function toggleDiscountType(t) { discountType=t; document.getElementById('btn-baht').className=`px-2 text-[9px] font-bold ${t==='baht'?'bg-slate-800 text-white':'text-slate-400'}`; document.getElementById('btn-percent').className=`px-2 text-[9px] font-bold ${t==='percent'?'bg-slate-800 text-white':'text-slate-400'}`; updateUI(); }
        function addToCart(i) { const x=cart.findIndex(c=>c.name===i.name); if(x>-1) cart[x].qty++; else cart.push({...i,qty:1}); updateUI(); if(i.isWeight) openEdit(cart.findIndex(c=>c.name===i.name)); }
        function openEdit(x) { editingIdx=x; document.getElementById('edit-title').innerText=cart[x].name; document.getElementById('edit-input').value=cart[x].qty; document.getElementById('edit-modal').style.display='flex'; document.getElementById('edit-input').select(); }
        function confirmEdit() { const v=parseFloat(document.getElementById('edit-input').value); if(v>=0){ if(v===0)cart.splice(editingIdx,1); else cart[editingIdx].qty=v; closeEdit(); updateUI(); } }
        function closeEdit() { document.getElementById('edit-modal').style.display='none'; }
        function openAdmin() { document.getElementById('admin-modal').style.display='flex'; document.getElementById('pp-id-input').value=promptpayID; document.getElementById('address-input').value=shopAddress; renderAdminLists(); }
        function closeAdmin() { document.getElementById('admin-modal').style.display='none'; }
        function changeBranch(v) { branchName=v; localStorage.setItem('selected_branch',v); updateBranchOptions(); updateUI(); }
        function resetQueue() { if(confirm('เริ่มคิวใหม่ #01?')){ orderQ=1; updateQueueDisplay(); } }
        function clearCart() { cart=[]; document.getElementById('discount-input').value=0; updateUI(); }
        function addNewMenuItem() { menuItems.push({name:'สินค้าใหม่',price:0,cat:'ทั่วไป',icon:'✨'}); renderAdminLists(); }
        function updateQueueDisplay() { const s=orderQ.toString().padStart(2,'0'); document.getElementById('next-q').innerText='#'+s; document.getElementById('receipt-q').innerText=s; localStorage.setItem('garden_order_q',orderQ); }

        // ฟังก์ชันส่งข้อมูลเข้า Google Sheets (กลับมาแล้วครับ!)
        async function handleCheckout() { 
            if(cart.length === 0) return;
            window.print(); 
            const payload = { 
                date: new Date().toLocaleString('th-TH'), 
                branch: branchName, 
                items: cart.map(i => `${i.name}(${i.qty})`).join(','), 
                total: document.getElementById('total-price').innerText, 
                queue: orderQ 
            };
            
            if(scriptURL && scriptURL !== 'YOUR_APPS_SCRIPT_URL') {
                try {
                    await fetch(scriptURL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(payload)
                    });
                } catch(e) { console.error("Sheets Error:", e); }
            }
            
            orderQ++; 
            updateQueueDisplay(); 
            clearCart(); 
        }

        updateQueueDisplay(); updateBranchOptions(); renderMenu(); updateUI();
    </script>
</body>
</html>
